name: Nightly refresh

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-7' }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      VOYAGE_MODEL: ${{ vars.VOYAGE_MODEL || 'voyage-3-large' }}
      APP_ENV: prod
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Kijiji round-robin (500 per city)
        run: python -u -m etl.scrape_kijiji --per-city 500

      - name: OSM POI refresh
        run: python -u -m etl.load_osm_pois

      - name: Recompute per-listing amenity distances
        run: python -u -m etl.compute_amenity_distances

      - name: Embed new listings
        run: python -u -m etl.embed_all

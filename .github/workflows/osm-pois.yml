name: OSM POI refresh

# POIs (cafes, transit, parks) are static infrastructure, so this runs weekly
# instead of nightly. It uses Geofabrik province extracts (offline .pbf) rather
# than the rate-limited public Overpass API, so it doesn't get throttled.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch: {}

concurrency:
  group: osm-pois
  cancel-in-progress: false

jobs:
  pois:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_ENV: prod
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Geofabrik POI ingest
        run: python -u -m etl.load_osm_pois_geofabrik

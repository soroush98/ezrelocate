# fly.toml app configuration file generated for ezrelocate-api on 2026-05-18T12:17:04-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ezrelocate-api'
primary_region = 'yyz'

[build]

[env]
  APP_ENV = 'prod'
  LOG_LEVEL = 'INFO'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MapLibre isolation test</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: ui-sans-serif, system-ui; }
    #map { position: absolute; inset: 0; }
    #log {
      position: absolute; top: 8px; left: 8px; z-index: 5;
      background: rgba(255,255,255,0.95); padding: 10px 14px; border-radius: 8px;
      font-size: 12px; font-family: ui-monospace, monospace; max-width: 60%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15); white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="log">starting…</div>
  <div id="map"></div>
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script>
    const log = document.getElementById('log');
    const lines = [];
    function say(...args) {
      const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
      lines.push(msg);
      log.textContent = lines.join('\n');
      console.log(msg);
    }

    // 1. Can we even create a WebGL2 context?
    const c = document.createElement('canvas');
    const gl2 = c.getContext('webgl2');
    const gl1 = c.getContext('webgl');
    say('webgl2:', !!gl2, ' webgl1:', !!gl1);
    if (gl2) {
      say('  webgl2 vendor:', gl2.getParameter(gl2.VENDOR));
      say('  webgl2 renderer:', gl2.getParameter(gl2.RENDERER));
      say('  webgl2 version:', gl2.getParameter(gl2.VERSION));
    }

    // 2. Try to construct a MapLibre map
    try {
      say('initialising MapLibre…');
      const map = new maplibregl.Map({
        container: 'map',
        style: {
          version: 8,
          sources: {
            carto: {
              type: 'raster',
              tiles: ['https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png'],
              tileSize: 256,
            },
          },
          layers: [
            { id: 'bg', type: 'background', paint: { 'background-color': '#f1f5f9' } },
            { id: 'carto', type: 'raster', source: 'carto' },
          ],
        },
        center: [-93, 49.2],
        zoom: 3.5,
      });
      map.on('load',  () => say('✓ map loaded'));
      map.on('error', (e) => say('✗ map error:', e?.error?.message || e));
      map.on('webglcontextlost', () => say('✗ webgl context LOST'));
    } catch (e) {
      say('✗ constructor threw:', e?.message ?? e);
    }
  </script>
</body>
</html>

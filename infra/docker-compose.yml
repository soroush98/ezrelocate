services:
  db:
    build: .
    image: relocate/postgis-pgvector:17
    container_name: relocate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: relocate
      POSTGRES_PASSWORD: relocate
      POSTGRES_DB: relocate
    ports:
      - "5432:5432"
    volumes:
      - relocate-pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relocate -d relocate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  relocate-pgdata:
